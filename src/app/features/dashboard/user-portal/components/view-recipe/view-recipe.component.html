<div class="loader-layer" *ngIf="isLoading">
  <mat-spinner></mat-spinner>
</div>
<section class="view-recipe-wrapper">
  <div class="title d-flex justify-content-between align-items-center">
    <h1 mat-dialog-title  >Recipe Details</h1>
    <span  mat-dialog-close  class="dialog-header text-end p-3 ">
    <i class="fa-regular fa-circle-xmark text-danger fs-3"></i>
    </span>
  </div>

  <div mat-dialog-content >
    <div class="w-50 d-flex w-100 align-items-center justify-content-center">
      <img  [src]="'https://upskilling-egypt.com:3006/'+receivedRecipe.imagePath" class="w-50"  [alt]="receivedRecipe.name">
    </div>
    <h4> Name:
      <span>{{receivedRecipe.name}}</span></h4>
    <h4>Price:
      <span>{{receivedRecipe.price}}</span></h4>
    <h4>
      Description:
      <span>{{receivedRecipe.description}}</span></h4>
    <h4>
     Category Name:
      <span> {{receivedRecipe.category[0]?.name}}</span></h4>
    <h4>
     Tag Name: <span>{{receivedRecipe.tag.name}}</span></h4>
  </div>
  <div  class="text-end p-3">
    <button mat-button mat-stroked-button color="accent" (click)="addToFavorite(receivedRecipe)"  [disabled]="isExistFavorite(receivedRecipe.id)">
      <i class="fa-regular fa-heart"></i>
      Favorite
    </button>

  </div>

</section>
