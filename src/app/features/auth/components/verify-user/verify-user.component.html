<section  class="auth-wrapper  d-flex justify-content-center align-items-center " >
  <div class="auth-content  bg-white p-5 rounded-3 " >
    <div class="header d-flex justify-content-center align-items-center">
      <img src="../../../../../assets/images/logo.png" alt="logo">
    </div>
    <div class="auth-form ">
      <div class="p-3">
        <h2> Verify Account
        </h2>
        <p>Please Enter Your Otp  or Check Your Inbox</p>
      </div>
      <form class="d-flex flex-column  gap-3 p-3" [formGroup]="verificationForm" (ngSubmit)="sendData(verificationForm)" >
        <div class="input-group mb-3">
          <span class="input-group-text" id="basic-addon1"><i class="fa-solid fa-envelope"></i></span>
          <input type="text" class="form-control" placeholder="Enter your E-mail" aria-label="Username" aria-describedby="basic-addon1"
                 formControlName="email"

          >
        </div>
        <div class="alert alert-danger" *ngIf="verificationForm.get('email')?.errors &&verificationForm.get('email')?.touched ">
          <p *ngIf="verificationForm.get('email')?.errors?.['required'] "> Email is Required</p>
          <p *ngIf="verificationForm.get('email')?.errors?.['email'] "> Email is invalid</p>

        </div>
        <div class="input-group mb-3">
          <span class="input-group-text" id="basic-addon2"><i class="fa-solid fa-lock"></i></span>
          <input type="text" class="form-control password" placeholder="OTP" aria-label="Code"
                 formControlName="code" aria-describedby="basic-addon2">
        </div>
        <div class="alert alert-danger" *ngIf="verificationForm.get('code')?.errors && verificationForm.get('code')?.touched">
          <p *ngIf="verificationForm.get('code')?.errors?.['required']"> OTp is Required</p>

        </div>

        <button type="submit" class="btn btn-primary btn-block rounded-2" [disabled]="verificationForm.invalid">send</button>
      </form>
    </div>
  </div>

</section>
