<section class="shared-delete">
  <span  mat-dialog-close  class="dialog-header d-flex ms-auto my-4">
  <i class="fa-regular fa-circle-xmark text-danger fs-3"></i>
</span>

  <div mat-dialog-content>
    <div  class="w-75 mx-auto  text-center">
      <img src="../../../../assets/images/no-data.png" alt="No data"  >
    </div>
    <div class="w-75 mx-auto  text-center">
      <h1>Delete This  <span class="text-danger">{{data.name}} </span>?</h1>
      <p>are you sure you want to  delete this <span class="text-danger">{{data.name}} </span> ? if you are sure just click on delete it</p>

    </div>
<div class="d-flex align-items-center justify-content-end">
  <button mat-stroked-button mat-dialog-close>Cancel</button>
  <button mat-button mat-stroked-button color="warn" (click)="onDelete()" >Delete</button>
</div>

  </div>

</section>
