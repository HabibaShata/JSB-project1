<div class="loader-layer" *ngIf="isLoading">
  <mat-spinner></mat-spinner>
</div>
<section class="auth-wrapper d-flex justify-content-center align-items-center">
  <div class="auth-content bg-white p-5 rounded-3">
    <div class="header d-flex justify-content-center align-items-center">
      <img src="../../../../assets/images/logo.png" alt="logo" />
    </div>
    <div class="auth-form">
      <div class="p-3">
        <h2>Change Your Password</h2>
        <p>Enter your details below</p>
      </div>
      <form
        class="d-flex flex-column gap-3 p-3"
        [formGroup]="editForm"
        (ngSubmit)="sendData(editForm)"
      >
        <button type="submit" class="btn btn-primary btn-block rounded-2">
          Change Password
        </button>
      </form>
    </div>
  </div>
</section>
